<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlacesToGO - Куди піти сьогодні?</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body, html {
            height: 100%;
            margin: 0;
            font-family: 'Arial', sans-serif;
        }

        .full-screen-bg {
            background: linear-gradient(135deg, #666eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: white;
        }

        .navbar {
            background-color: rgba(0, 0, 0, 0.7) !important;
            backdrop-filter: blur(10px);
        }

        .hero-content {
            padding-top: 100px;
            text-align: center;
        }

        .btn-random {
            background-color: #ff6b6b;
            border: none;
            padding: 15px 30px;
            font-size: 1.2rem;
            transition: transform 0.3s;
            margin-top: 30px;
        }

        .btn-random:hover {
            transform: scale(1.05);
            background-color: #ff5252;
        }

        .result-card {
            display: none;
            margin-top: 30px;
            background-color: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>
    <div class="full-screen-bg">
        <nav class="navbar navbar-expand-lg navbar-dark">
            <div class="container">
                <a class="navbar-brand fw-bold" href="/">PlacesToGO</a>
                <div class="navbar-nav">
                    <a class="nav-link active" href="/">Головна</a>
                    <a class="nav-link" href=" /all_places/">Усі місця</a>
                    <a class="nav-link" href=" /add_place/">Додати місце</a>
                </div>
            </div>
        </nav>

        <!-- Головний контент -->
        <div class="container">
            <div class="hero-content">
                <h1 class="display-4 fw-bold mb-3">PlacesToGO</h1>
                <p class="lead fs-4 mb-2">Знайди найкращі місця для відпочинку у твоєму місті</p>
                <p class="fs-5">Відкривай нові локації, ділись враженнями та плануй свої пригоди</p>

                <a href="/where_to_go/" class="btn btn-random btn-lg">
                    Куди піти сьогодні?
                </a>

                <!-- Результат -->
                <div class="result-card card text-white" id="resultCard">
                    <div class="card-body text-center">
                        <h4 class="card-title fw-bold" id="placeName">Назва місця</h4>
                        <p class="card-text fs-5" id="placeDescription">Опис місця...</p>
                        <div class="rating">
                            <span class="badge bg-success fs-6" id="placeRating">Рейтинг: 5/5</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
