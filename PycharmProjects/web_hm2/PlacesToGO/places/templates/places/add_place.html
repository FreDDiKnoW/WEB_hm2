{% extends 'places/base.html' %}

{% block title %}Додати місце - PlacesToGO{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-body">
                <h1 class="text-center mb-4">Додати нове місце</h1>

                <form method="POST">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label for="name" class="form-label">Назва місця *</label>
                        <input type="text" class="form-control" id="name" name="name" required>
                    </div>

                    <div class="mb-3">
                        <label for="description" class="form-label">Опис *</label>
                        <textarea class="form-control" id="description" name="description" rows="4" required></textarea>
                    </div>

                    <div class="mb-3">
                        <label for="place_type" class="form-label">Тип місця *</label>
                        <select class="form-select" id="place_type" name="place_type" required>
                            <option value="">Оберіть тип...</option>
                            <option value="restaurant">Ресторан</option>
                            <option value="cafe">Кафе</option>
                            <option value="park">Парк</option>
                            <option value="museum">Музей</option>
                            <option value="cinema">Кінотеатр</option>
                            <option value="other">Інше</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label for="location" class="form-label">Локація</label>
                        <input type="text" class="form-control" id="location" name="location" placeholder="Не обов'язково">
                    </div>

                    <div class="mb-3">
                        <label for="rating" class="form-label">Рейтинг (1-5) *</label>
                        <input type="number" class="form-control" id="rating" name="rating" min="1" max="5" required>
                    </div>

                    <div class="mb-3">
                        <label for="image" class="form-label">Зображення</label>
                        <input type="file" class="form-control" id="image" name="image" accept="image/*">
                    </div>

                    <div class="text-center">
                        <button type="submit" class="btn btn-primary btn-lg">Додати місце</button>
                        <a href="/all_places/" class="btn btn-secondary btn-lg ms-2">Скасувати</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
